name: build

on:
  push:
    paths-ignore:
      # Do not trigger if docs changed
      - 'docs/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: sbt
      - name: Setup SBT
        uses: sbt/setup-sbt@v1
      - name: Build and test
        run: sbt -v +test
